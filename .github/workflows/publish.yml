name: Publish

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  ZIG_VERSION: "0.16.0"

jobs:
  publish:
    runs-on: ubuntu-latest
    # OIDC trusted-publishing to crates.io requires `id-token: write`.
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install Zig ${{ env.ZIG_VERSION }}
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Verify tag matches workspace version
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          version=$(sed -n '/^\[workspace\.package\]/,/^\[/{s/^version *= *"\(.*\)"/\1/p;}' Cargo.toml)
          if [[ "$tag" != "$version" ]]; then
            echo "error: tag '$GITHUB_REF_NAME' does not match workspace version '$version'" >&2
            exit 1
          fi
          echo "publishing version $version"

      - name: Authenticate to crates.io via OIDC
        uses: rust-lang/crates-io-auth-action@v1
        id: crates-io-auth

      - name: Publish libxev-sys
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-io-auth.outputs.token }}
        run: cargo publish -p libxev-sys --locked

      - name: Publish libxev
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-io-auth.outputs.token }}
        # libxev depends on the libxev-sys we just published; crates.io
        # may take a moment to surface the new version in its index.
        run: cargo publish -p libxev --locked
